<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{heading}}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
            color: #1f2937;
            line-height: 1.6;
        }
        .container {
            max-width: 620px;
            margin: 32px auto;
            background: #ffffff;
            border: 1px solid #d7dde8;
            border-radius: 8px;
            overflow: hidden;
        }
        .header {
            background: #2563eb;
            color: #ffffff;
            text-align: center;
            padding: 28px 22px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0;
        }
        .content {
            padding: 28px;
            font-size: 16px;
            color: #344054;
        }
        .content p {
            margin-bottom: 14px;
        }
        .content strong {
            color: #111827;
        }
        .info {
            margin: 18px 0;
            padding: 16px;
            border: 1px solid #d7dde8;
            border-radius: 8px;
            background: #f8fafc;
        }
        .info h2 {
            margin: 0 0 8px;
            color: #111827;
            font-size: 18px;
        }
        .button {
            display: inline-block;
            margin-top: 4px;
            background-color: #2563eb;
            color: #ffffff !important;
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 6px;
            font-weight: 700;
        }
        .footer {
            background-color: #f8fafc;
            text-align: center;
            padding: 16px;
            font-size: 13px;
            color: #667085;
            border-top: 1px solid #e5e7eb;
        }
        @media screen and (max-width: 620px) {
            .container {
                margin: 16px;
            }
            .header,
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{heading}}</h1>
        </div>
        <div class="content">
            <p>Hi <strong>{{fullname}}</strong>,</p>
            <p>{{intro}}</p>
            <p>Your registered email is <strong>{{email}}</strong>.</p>

            <div class="info">
                <h2>{{nextStepTitle}}</h2>
                <p>{{nextStep}}</p>
            </div>

            <p><a href="{{ctaUrl}}" target="_blank" class="button">{{ctaText}}</a></p>
            <p>{{footerNote}}</p>
        </div>
        <div class="footer">
            TailorGo helps customers connect with nearby tailors for stitching, alteration, and custom fitting.
        </div>
    </div>
</body>
</html>
